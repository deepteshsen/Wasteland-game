<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shards of the Waste Land — DH Research Edition</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div id="overlay">
<h1>SHARDS OF THE WASTE LAND</h1>

<div id="scorePanel">Interpretation Score: <span id="score">0</span></div>

<div id="controls">
<button onclick="generateFragments()">Generate</button>
<button onclick="toggleAudio()">Audio</button>
<button onclick="exportBuild()">Export</button>
<button onclick="clearBuild()">Reset</button>
</div>

<div id="fragmentZone"></div>

<div id="citationPanel"></div>
<div id="stylometryPanel"></div>

<div id="researchPanel">
<h3>Research Framing</h3>
<p>
Sen, Deeptesh. <i>Shards of the Waste Land: A Digital Hermeneutic Engine.</i> 
GitHub Pages, 2026.
</p>
</div>

</div>

<div id="graph"></div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";
import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

/* ------------------ WEBGL SCENE ------------------ */

let scene=new THREE.Scene();
let camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
let renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);
camera.position.z=5;

let stars=[];
for(let i=0;i<300;i++){
let geo=new THREE.SphereGeometry(0.05,8,8);
let mat=new THREE.MeshBasicMaterial({color:0xffffff});
let star=new THREE.Mesh(geo,mat);
star.position.set((Math.random()-0.5)*20,(Math.random()-0.5)*20,(Math.random()-0.5)*20);
scene.add(star);
stars.push(star);
}

let lines=[];

function animate(){
requestAnimationFrame(animate);
scene.rotation.y+=0.0004;
renderer.render(scene,camera);
}
animate();

/* ------------------ FRAGMENTS ------------------ */

let fragments=[
"April is the cruellest month",
"I will show you fear in a handful of dust",
"Sweet Thames, run softly",
"Burning burning burning",
"Here is no water but only rock",
"Shantih shantih shantih"
];

let selected=JSON.parse(localStorage.getItem("build"))||[];
updateScore();

window.generateFragments=function(){
let zone=document.getElementById("fragmentZone");
zone.innerHTML="";
fragments.forEach(text=>{
let div=document.createElement("div");
div.className="fragment";
div.innerText=text;

if(selected.includes(text)) div.classList.add("active");

div.onclick=()=>{
div.classList.toggle("active");
if(selected.includes(text)){
selected=selected.filter(x=>x!==text);
}else{
selected.push(text);
}
localStorage.setItem("build",JSON.stringify(selected));
updateGraph();
updateScore();
updateCitation();
updateStylometry();
drawConstellations();
};
zone.appendChild(div);
});
};

generateFragments();

/* ------------------ INTERTEXT ------------------ */

function intertext(f){
if(f.includes("dust")) return "Genesis / Dante";
if(f.includes("water")) return "Upanishads";
if(f.includes("Burning")) return "Augustine";
if(f.includes("Shantih")) return "Brihadaranyaka Upanishad";
return "Modernist Fragment";
}

/* ------------------ GRAPH ------------------ */

function updateGraph(){
document.getElementById("graph").innerHTML="";
let nodes=[];
let links=[];
selected.forEach(f=>{
nodes.push({id:f});
let ref=intertext(f);
nodes.push({id:ref});
links.push({source:f,target:ref});
});
let svg=d3.select("#graph").append("svg")
.attr("width",400).attr("height",window.innerHeight);

let sim=d3.forceSimulation(nodes)
.force("link",d3.forceLink(links).id(d=>d.id).distance(80))
.force("charge",d3.forceManyBody().strength(-200))
.force("center",d3.forceCenter(200,window.innerHeight/2));

let link=svg.selectAll("line").data(links)
.enter().append("line").attr("stroke","#888");

let node=svg.selectAll("circle").data(nodes)
.enter().append("circle")
.attr("r",6)
.attr("fill","#ccc")
.call(d3.drag().on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y;}));

let label=svg.selectAll("text").data(nodes)
.enter().append("text")
.text(d=>d.id)
.attr("fill","#aaa")
.attr("font-size","10px");

sim.on("tick",()=>{
link.attr("x1",d=>d.source.x)
.attr("y1",d=>d.source.y)
.attr("x2",d=>d.target.x)
.attr("y2",d=>d.target.y);

node.attr("cx",d=>d.x)
.attr("cy",d=>d.y);

label.attr("x",d=>d.x+8)
.attr("y",d=>d.y+4);
});
}

/* ------------------ CONSTELLATION LINES ------------------ */

function drawConstellations(){
lines.forEach(l=>scene.remove(l));
lines=[];
for(let i=0;i<selected.length-1;i++){
let mat=new THREE.LineBasicMaterial({color:0x8888ff});
let points=[];
points.push(new THREE.Vector3(Math.random()*2-1,Math.random()*2-1,0));
points.push(new THREE.Vector3(Math.random()*2-1,Math.random()*2-1,0));
let geo=new THREE.BufferGeometry().setFromPoints(points);
let line=new THREE.Line(geo,mat);
scene.add(line);
lines.push(line);
}
}

/* ------------------ SCORING ------------------ */

function updateScore(){
let diversity=new Set(selected.map(intertext)).size;
let score=selected.length*10+diversity*15;
document.getElementById("score").innerText=score;
}

/* ------------------ CITATION ------------------ */

function updateCitation(){
let panel=document.getElementById("citationPanel");
let html="<h3>Citations</h3>";
selected.forEach(f=>{
html+="<p>"+intertext(f)+"</p>";
});
panel.innerHTML=html;
}

/* ------------------ STYLOMETRY ------------------ */

function updateStylometry(){
let panel=document.getElementById("stylometryPanel");
let text=selected.join(" ");
let words=text.split(" ");
let freq={};
words.forEach(w=>freq[w]=(freq[w]||0)+1);
let html="<h3>Stylometry</h3>";
for(let w in freq){
html+=w+": "+freq[w]+"<br>";
}
panel.innerHTML=html;
}

/* ------------------ AUDIO ------------------ */

let audioOn=false;
let ctx=new (window.AudioContext||window.webkitAudioContext)();
let oscillators=[];

window.toggleAudio=function(){
if(audioOn){
oscillators.forEach(o=>o.stop());
oscillators=[];
audioOn=false;
}else{
[40,70,120].forEach(freq=>{
let osc=ctx.createOscillator();
osc.frequency.value=freq;
osc.connect(ctx.destination);
osc.start();
oscillators.push(osc);
});
audioOn=true;
}
};

window.exportBuild=function(){
let blob=new Blob([JSON.stringify(selected)],{type:"application/json"});
let url=URL.createObjectURL(blob);
let a=document.createElement("a");
a.href=url;
a.download="interpretation.json";
a.click();
};

window.clearBuild=function(){
localStorage.removeItem("build");
location.reload();
};

updateGraph();
updateCitation();
updateStylometry();

</script>
</body>
</html>
